name: Daily Signal Build

# Runs every day at 08:00 Singapore time (00:00 UTC). Rebuilds docs/data/daily.json
# (last 24 hours only) and commits it straight back to the repo, which GitHub
# Pages then serves automatically. No secrets required — this workflow only
# reads public RSS feeds and writes back to its own repo.
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build daily data
        run: python build_data.py --mode daily

      - name: Commit and push updated data
        run: |
          git config user.name "signal-desk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/daily.json docs/data/sources.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: refresh daily signal ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
