name: Weekly Signal Build

# Runs every Tuesday at 09:00 Singapore time (01:00 UTC). Rebuilds
# docs/data/weekly.json (last 7 days, more stories per stack) and commits
# it back to the repo for GitHub Pages to serve.
on:
  schedule:
    - cron: "0 1 * * 2"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build weekly data
        run: python build_data.py --mode weekly

      - name: Commit and push updated data
        run: |
          git config user.name "signal-desk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/weekly.json docs/data/sources.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: refresh weekly signal ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
